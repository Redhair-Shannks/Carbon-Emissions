databases:
  - name: carbonsight-db
    plan: free
    databaseName: carbonsight
    user: carbonsight

services:
  - type: web
    name: carbonsight-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carbonsight-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://carbonsight-dashboard.onrender.com"]'
      - key: SEED_WORKBOOK_PATH
        value: /app/GHG Sheet.xlsx

  - type: web
    name: carbonsight-dashboard
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://carbonsight-api.onrender.com
